[phases.setup]
nixPkgs = [
    "cmake",
    "gcc",
    "python311",
    "python311Packages.pip",
    "blas",
    "lapack",
]

[phases.build]
cmds = [
    "pip install cmake",
    "pip install dlib",
    "pip install -r requirements.txt"
]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"
